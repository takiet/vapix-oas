post:
  summary: Gain mode control
  requestBody:
    content:
      application/json:
        schema:
          type: object
          properties:
            apiVersion:
              type: string
              enum: ["1.0"]
            method:
              type: string
              enum: ["setGainMode", "getGainMode"]
            params:
              required: false
              type: object
              properties:
                gainMode:
                  type: integer
                  enum: [0, 1, 2]
        examples:
          setGainMode:
            summary: Set mode
            value:
              apiVersion: "1.0"
              method: "setGainMode"
              params:
                type: 1
          getGainMode:
            summary: Get the current mode
            value:
              apiVersion: "1.0"
              method: "getGainMode"

  response: {}
  tags:
    - Thermometry
  description: "Set the thermometric gain mode or retrieve the current mode (0: auto, 1: low, 2: high)"
